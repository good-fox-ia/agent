framework:
    messenger:
        transports:
            sync: 'sync://'

            telegram_inbound:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: telegram_inbound
                        type: fanout
                    queues:
                        telegram_inbound: ~

            telegram_messages:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: telegram_messages
                        type: fanout
                    queues:
                        telegram_messages: ~

            telegram_audio:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: telegram_audio
                        type: fanout
                    queues:
                        telegram_audio: ~

            telegram_media:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: telegram_media
                        type: fanout
                    queues:
                        telegram_media: ~

            telegram_message_private:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: telegram_message_private
                        type: fanout
                    queues:
                        telegram_message_private: ~

            telegram_message_group:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: telegram_message_group
                        type: fanout
                    queues:
                        telegram_message_group: ~

        routing:
            App\Message\Telegram\ProcessTelegramMessage: telegram_inbound
            # Callback обробляємо синхронно в telegram-poll, щоб не чекати в черзі воркера
            App\Message\Telegram\ProcessTelegramCallback: sync
            App\Message\Telegram\Content\ProcessTelegramTextMessage: telegram_messages
            App\Message\Telegram\Content\ProcessTelegramAudioMessage: telegram_audio
            App\Message\Telegram\Content\ProcessTelegramMediaMessage: telegram_media
            App\Message\Telegram\Chat\ProcessTelegramPrivateMessage: telegram_message_private
            App\Message\Telegram\Chat\ProcessTelegramGroupMessage: telegram_message_group
