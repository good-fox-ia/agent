# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    groq.chat_model: 'openai/gpt-oss-120b'
    gemini.chat_model: 'gemini-2.0-flash'
    gemini.image_model: 'gemini-2.5-flash-image'
    # TTS-моделі в порядку failover (помилка/квота — наступна)
    gemini.tts_models: 'gemini-2.5-flash-preview-tts,gemini-3.1-flash-tts-preview'
    openrouter.image_model: 'google/gemini-2.5-flash-image'
    cloudflare.image_model: '@cf/black-forest-labs/flux-2-klein-4b'
    llm.text_providers_default: 'groq'
    llm.audio_providers_default: 'groq'
    llm.image_providers_default: 'gemini,groq'
    # Безплатний (cloudflare) — першим; платні — як запасні
    llm.image_generation_providers_default: 'cloudflare,openrouter,gemini'
    llm.audio_generation_providers_default: 'gemini'
    groq.vision_model: 'meta-llama/llama-4-maverick-17b-128e-instruct'
    telegram.social_video.yt_dlp_binary: '/usr/local/bin/yt-dlp'
    telegram.social_video.cookies_file: ''

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/Service/LLM/Tool/TelegramBotCommandTool.php'

    App\Service\LLM\Client\Interface\TextLLMInterface:
        factory: ['@App\Service\LLM\Factory\LlmProviderFactory', 'createTextLlm']

    App\Service\LLM\Client\Interface\AudioTranscriptionLLMInterface:
        factory: ['@App\Service\LLM\Factory\LlmProviderFactory', 'createAudioTranscriptionLlm']

    App\Service\LLM\Client\Interface\ImageDescriptionLLMInterface:
        factory: ['@App\Service\LLM\Factory\LlmProviderFactory', 'createImageDescriptionLlm']

    App\Service\LLM\Client\Interface\ImageGenerationLLMInterface:
        factory: ['@App\Service\LLM\Factory\LlmProviderFactory', 'createImageGenerationLlm']

    App\Service\LLM\Client\Interface\AudioGenerationLLMInterface:
        factory: ['@App\Service\LLM\Factory\LlmProviderFactory', 'createAudioGenerationLlm']

    App\Service\LLM\Factory\LlmProviderFactory:
        arguments:
            $textProvidersCsv: '%env(default:llm.text_providers_default:LLM_TEXT_PROVIDERS)%'
            $audioProvidersCsv: '%env(default:llm.audio_providers_default:LLM_AUDIO_PROVIDERS)%'
            $imageProvidersCsv: '%env(default:llm.image_providers_default:LLM_IMAGE_PROVIDERS)%'
            $imageGenerationProvidersCsv: '%env(default:llm.image_generation_providers_default:LLM_IMAGE_GENERATION_PROVIDERS)%'
            $audioGenerationProvidersCsv: '%env(default:llm.audio_generation_providers_default:LLM_AUDIO_GENERATION_PROVIDERS)%'

    _instanceof:
        App\Service\LLM\Tool\ToolInterface:
            tags: ['app.llm.tool']

        App\Service\Telegram\Command\CommandProcessInterface:
            tags: ['app.telegram.command_process']

    App\Service\LLM\Tool\ToolRegistry:
        arguments:
            $tools: !tagged_iterator app.llm.tool

    App\Service\Telegram\Command\CommandProcessor:
        arguments:
            $processes: !tagged_iterator app.telegram.command_process

    App\Service\LLM\Tool\TelegramBotCommandTool.start:
        class: App\Service\LLM\Tool\TelegramBotCommandTool
        autowire: true
        autoconfigure: false
        tags: ['app.llm.tool']
        arguments:
            $command: !php/enum App\Enum\TelegramBotCommand::START
            $toolName: !php/enum App\Enum\ToolName::TELEGRAM_COMMAND_START
            $description: 'Run the /start bot command: send the welcome message with bot capabilities. Use when the user greets the bot, asks what you can do, or wants to start over — same as typing /start in Telegram.'

    App\Service\LLM\Tool\TelegramBotCommandTool.help:
        class: App\Service\LLM\Tool\TelegramBotCommandTool
        autowire: true
        autoconfigure: false
        tags: ['app.llm.tool']
        arguments:
            $command: !php/enum App\Enum\TelegramBotCommand::HELP
            $toolName: !php/enum App\Enum\ToolName::TELEGRAM_COMMAND_HELP
            $description: 'Run the /help bot command: send help and usage hints. Use when the user asks for help, commands list, or how to use the bot — same as typing /help.'

    App\Service\LLM\Tool\TelegramBotCommandTool.new_chat:
        class: App\Service\LLM\Tool\TelegramBotCommandTool
        autowire: true
        autoconfigure: false
        tags: ['app.llm.tool']
        arguments:
            $command: !php/enum App\Enum\TelegramBotCommand::NEW_CHAT
            $toolName: !php/enum App\Enum\ToolName::TELEGRAM_COMMAND_NEW_CHAT
            $description: 'Run the /newchat bot command: start a fresh conversation (clears visible chat history in Telegram and creates a new logical chat). Use when the user wants a new chat, clean slate, or to reset the conversation — same as typing /newchat.'

    App\Service\LLM\Tool\TelegramBotCommandTool.keyboard_on:
        class: App\Service\LLM\Tool\TelegramBotCommandTool
        autowire: true
        autoconfigure: false
        tags: ['app.llm.tool']
        arguments:
            $command: !php/enum App\Enum\TelegramBotCommand::KEYBOARD_ON
            $toolName: !php/enum App\Enum\ToolName::TELEGRAM_COMMAND_KEYBOARD_ON
            $description: 'Run the /keyboardon bot command: enable the reply keyboard buttons at the bottom of the chat. Use when the user wants buttons or keyboard turned on — same as typing /keyboardon.'

    App\Service\LLM\Tool\TelegramBotCommandTool.keyboard_off:
        class: App\Service\LLM\Tool\TelegramBotCommandTool
        autowire: true
        autoconfigure: false
        tags: ['app.llm.tool']
        arguments:
            $command: !php/enum App\Enum\TelegramBotCommand::KEYBOARD_OFF
            $toolName: !php/enum App\Enum\ToolName::TELEGRAM_COMMAND_KEYBOARD_OFF
            $description: 'Run the /keyboardoff bot command: disable the reply keyboard buttons. Use when the user wants to hide buttons or turn keyboard off — same as typing /keyboardoff.'

    App\Service\LLM\Tool\TelegramBotCommandTool.voice_on:
        class: App\Service\LLM\Tool\TelegramBotCommandTool
        autowire: true
        autoconfigure: false
        tags: ['app.llm.tool']
        arguments:
            $command: !php/enum App\Enum\TelegramBotCommand::VOICE_ON
            $toolName: !php/enum App\Enum\ToolName::TELEGRAM_COMMAND_VOICE_ON
            $description: 'Run the /voiceon bot command: enable voice (TTS) replies for this user — the bot will answer with voice messages. Use when the user asks the bot to reply with voice, speak answers aloud, or turn voice replies on — same as typing /voiceon.'

    App\Service\LLM\Tool\TelegramBotCommandTool.voice_off:
        class: App\Service\LLM\Tool\TelegramBotCommandTool
        autowire: true
        autoconfigure: false
        tags: ['app.llm.tool']
        arguments:
            $command: !php/enum App\Enum\TelegramBotCommand::VOICE_OFF
            $toolName: !php/enum App\Enum\ToolName::TELEGRAM_COMMAND_VOICE_OFF
            $description: 'Run the /voiceoff bot command: disable voice (TTS) replies for this user — the bot will answer with text again. Use when the user wants text answers or voice replies turned off — same as typing /voiceoff.'

    App\Service\LLM\Tool\TelegramBotCommandTool.voice:
        class: App\Service\LLM\Tool\TelegramBotCommandTool
        autowire: true
        autoconfigure: false
        tags: ['app.llm.tool']
        arguments:
            $command: !php/enum App\Enum\TelegramBotCommand::VOICE
            $toolName: !php/enum App\Enum\ToolName::TELEGRAM_COMMAND_VOICE
            $description: 'Run the /voice bot command: show an inline keyboard to pick the TTS voice for spoken replies. Use when the user wants to change or choose the voice the bot speaks with — same as typing /voice.'

    App\Service\LLM\Tool\TelegramBotCommandTool.list_chats:
        class: App\Service\LLM\Tool\TelegramBotCommandTool
        autowire: true
        autoconfigure: false
        tags: ['app.llm.tool']
        arguments:
            $command: !php/enum App\Enum\TelegramBotCommand::LIST_CHATS
            $toolName: !php/enum App\Enum\ToolName::TELEGRAM_COMMAND_LIST_CHATS
            $description: 'Run the /listchats bot command: show the user their saved conversations as inline buttons to switch chat. Use when the user wants to see or switch conversations — same as typing /listchats.'

    App\Service\LLM\Tool\TelegramBotCommandTool.edit_system_prompt:
        class: App\Service\LLM\Tool\TelegramBotCommandTool
        autowire: true
        autoconfigure: false
        tags: ['app.llm.tool']
        arguments:
            $command: !php/enum App\Enum\TelegramBotCommand::EDIT_SYSTEM_PROMPT
            $toolName: !php/enum App\Enum\ToolName::TELEGRAM_COMMAND_EDIT_SYSTEM_PROMPT
            $description: 'Run the /edit_system_promt bot command: view or change the LLM system prompt for the active conversation. Use when the user wants custom instructions for this chat. Args: new prompt text, or "reset" to clear. Same as typing /edit_system_promt in Telegram.'

    App\Service\LLM\Tool\TelegramBotCommandTool.friends:
        class: App\Service\LLM\Tool\TelegramBotCommandTool
        autowire: true
        autoconfigure: false
        tags: ['app.llm.tool']
        arguments:
            $command: !php/enum App\Enum\TelegramBotCommand::FRIENDS
            $toolName: !php/enum App\Enum\ToolName::TELEGRAM_COMMAND_FRIENDS
            $description: 'Run the /friends bot command: show the user their friends list (usernames and names). Use when the user wants to see friends or who is in their friends list — same as typing /friends in Telegram.'

    App\Service\LLM\Tool\TelegramBotCommandTool.add_friend:
        class: App\Service\LLM\Tool\TelegramBotCommandTool
        autowire: true
        autoconfigure: false
        tags: ['app.llm.tool']
        arguments:
            $command: !php/enum App\Enum\TelegramBotCommand::ADD_FRIEND
            $toolName: !php/enum App\Enum\ToolName::TELEGRAM_COMMAND_ADD_FRIEND
            $description: 'Run the /addfriend bot command: add a user to the friends list by Telegram username. The user must have messaged the bot at least once. Same as typing /addfriend @username in Telegram.'
            $usernameArgument: 'username'

    App\Service\LLM\Tool\TelegramBotCommandTool.topup:
        class: App\Service\LLM\Tool\TelegramBotCommandTool
        autowire: true
        autoconfigure: false
        tags: ['app.llm.tool']
        arguments:
            $command: !php/enum App\Enum\TelegramBotCommand::TOPUP
            $toolName: !php/enum App\Enum\ToolName::TELEGRAM_COMMAND_TOPUP
            $description: 'Run the /topup bot command: top up the user Stars balance via Telegram payment. Use when the user wants to add Stars or pay — same as typing /topup in Telegram. Optional amount argument, e.g. /topup 50.'

    App\Service\LLM\Tool\TelegramBotCommandTool.balance:
        class: App\Service\LLM\Tool\TelegramBotCommandTool
        autowire: true
        autoconfigure: false
        tags: ['app.llm.tool']
        arguments:
            $command: !php/enum App\Enum\TelegramBotCommand::BALANCE
            $toolName: !php/enum App\Enum\ToolName::TELEGRAM_COMMAND_BALANCE
            $description: 'Run the /balance bot command: show the user current Telegram Stars balance. Use when the user asks how many Stars they have — same as typing /balance in Telegram.'

    App\Service\LLM\Client\Groq:
        arguments:
            $apiKey: '%env(GROQ_API_KEY)%'
            $promptAdapter: '@App\Service\LLM\Adapter\GroqPromptAdapter'
            $defaultChatModel: '%env(default:groq.chat_model:GROQ_CHAT_MODEL)%'
            $defaultVisionModel: '%env(default:groq.vision_model:GROQ_VISION_MODEL)%'

    App\Service\LLM\Client\Gemini:
        arguments:
            $apiKey: '%env(GEMINI_API_KEY)%'
            $promptAdapter: '@App\Service\LLM\Adapter\GeminiPromptAdapter'
            $defaultChatModel: '%env(default:gemini.chat_model:GEMINI_CHAT_MODEL)%'
            $defaultImageModel: '%env(default:gemini.image_model:GEMINI_IMAGE_MODEL)%'
            $ttsModelsCsv: '%env(default:gemini.tts_models:GEMINI_TTS_MODELS)%'

    App\Service\LLM\Client\OpenRouter:
        arguments:
            $apiKey: '%env(OPENROUTER_API_KEY)%'
            $defaultImageModel: '%env(default:openrouter.image_model:OPENROUTER_IMAGE_MODEL)%'

    App\Service\LLM\Client\CloudflareWorkersAi:
        arguments:
            $accountId: '%env(CLOUDFLARE_ACCOUNT_ID)%'
            $apiToken: '%env(CLOUDFLARE_API_TOKEN)%'
            $defaultImageModel: '%env(default:cloudflare.image_model:CLOUDFLARE_IMAGE_MODEL)%'

    App\Service\Telegram\Api\TelegramService:
        arguments:
            $token: '%env(TELEGRAM_BOT_TOKEN)%'

    App\Service\Telegram\Video\SocialVideoDownloader:
        arguments:
            $ytDlpBinary: '%env(default:telegram.social_video.yt_dlp_binary:SOCIAL_VIDEO_YT_DLP_BINARY)%'
            $downloadDir: '%kernel.cache_dir%/social_video'
            $cookiesFile: '%env(default:telegram.social_video.cookies_file:SOCIAL_VIDEO_COOKIES_FILE)%'
            $projectDir: '%kernel.project_dir%'

    App\Service\Telegram\Video\ThreadsPostDownloader:
        arguments:
            $downloadDir: '%kernel.cache_dir%/social_video'

    App\Service\Telegram\Media\TelegramMediaStorage:
        arguments:
            $storageDir: '%kernel.project_dir%/var/telegram_media'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
