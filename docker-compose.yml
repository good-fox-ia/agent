# Запуск: ./bin/start
# Зупинка: ./bin/stop
# Консоль: docker compose exec php php bin/console ...
# Mongo: localhost:27017 | Redis: 6379 | RabbitMQ UI: http://localhost:15672
# Prod: ./bin/deploy (docker-compose.prod.yml + .env.local)
#
# HTTP ззовні не відкритий — бот працює через long polling (telegram-poll) і черги (messenger-worker).

x-php: &php
  build:
    context: .
    dockerfile: docker/php/Dockerfile
  volumes:
    - .:/var/www/html
  environment: &php-environment
    APP_ENV: dev
    APP_DEBUG: "1"
    MONGODB_URI: mongodb://mongodb:27017
    MONGODB_DB: app
    REDIS_URL: redis://redis:6379
    MESSENGER_TRANSPORT_DSN: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/%2f
    # yt-dlp з pip у контейнері (не debian /usr/bin/yt-dlp і не macOS Homebrew)
    SOCIAL_VIDEO_YT_DLP_BINARY: /usr/local/bin/yt-dlp
  depends_on:
    - mongodb
    - redis
    - rabbitmq

services:
  php:
    <<: *php
    command: ["sleep", "infinity"]

  telegram-poll:
    <<: *php
    command: ["php", "bin/console", "app:telegram:event-updates"]
    restart: unless-stopped

  messenger-worker:
    <<: *php
    command:
      - php
      - bin/console
      - messenger:consume
      - telegram_inbound
      - telegram_messages
      - telegram_audio
      - telegram_media
      - telegram_message_private
      - telegram_message_group
      - -vv
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}

volumes:
  mongodb_data: {}
